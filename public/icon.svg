<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B46C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="256" fill="url(#grad1)"/>

  <!-- Book Icon (centered) -->
  <g transform="translate(256, 256)">
    <!-- Left page -->
    <path d="M -100 -80 L -100 80 Q -100 100 -80 100 L 0 100 L 0 -100 L -80 -100 Q -100 -100 -100 -80 Z"
          fill="white"
          opacity="0.9"/>

    <!-- Right page -->
    <path d="M 100 -80 L 100 80 Q 100 100 80 100 L 0 100 L 0 -100 L 80 -100 Q 100 -100 100 -80 Z"
          fill="white"
          opacity="0.9"/>

    <!-- Center spine -->
    <rect x="-5" y="-100" width="10" height="200" fill="white"/>

    <!-- Japanese character 本 (book) -->
    <text x="0" y="10"
          font-family="Arial, sans-serif"
          font-size="80"
          font-weight="bold"
          fill="#6B46C1"
          text-anchor="middle">本</text>
  </g>
</svg>